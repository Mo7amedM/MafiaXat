<!DOCTYPE html>  
<html lang="ar" dir="rtl">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>معلومات عني</title>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">  
    <link rel="stylesheet" href="../css/style.css">  
    <link rel="stylesheet" href="../css/about.css">  
    <!-- إعدادات الموقع يتم تحميلها أولاً -->
    <script src="../js/data.js"></script>
</head>  
<body>  

    <!-- Header -->  
    <div style="background: linear-gradient(135deg, #0f0c29, #e94560); padding: 40px; text-align: center;">  
        <h1 style="color: white; font-size: 48px;">  
            <i class="fas fa-user-astronaut"></i> معلومات عني  
        </h1>  
        <p style="color: #ddd;">تعرف علي أكثر وتواصل معي مباشرة</p>  
    </div>  

    <!-- Navigation -->  
    <nav class="main-nav" style="background: #16213e; padding: 15px 0;">  
        <div id="dynamic-nav-container" class="nav-container" style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;">
        </div>  
    </nav>  

    <!-- ====== MAIN CONTENT ====== -->  
    <main style="padding: 40px 20px; max-width: 1000px; margin: 0 auto;">  

        <!-- ====== Profile Section ====== -->  
        <section class="profile-section" style="  
            background: linear-gradient(145deg, #1a1a2e, #16213e);  
            border-radius: 20px; padding: 40px; margin-bottom: 30px;  
            border: 1px solid rgba(233,69,96,0.3);  
        ">  
            <div style="display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">  
                
                <!-- الصورة الشخصية -->  
                <div class="profile-image" style="flex-shrink: 0;">  
                    <div style="  
                        width: 200px; height: 200px; border-radius: 50%;  
                        border: 5px solid #e94560; overflow: hidden;  
                        box-shadow: 0 0 40px rgba(233,69,96,0.5);  
                    ">  
                        <img id="aboutProfileImg" alt="صورتي" style="width: 100%; height: 100%; object-fit: cover;">  
                    </div>  
                </div>  

                <!-- المعلومات -->  
                <div class="profile-info" style="flex: 1; min-width: 250px;">  
                    <h2 style="color: #e94560; font-size: 36px; margin-bottom: 10px;">  
                        <i class="fas fa-crown" style="color: #ffd700;"></i>  Mafia  
                    </h2>  
                    <p style="color: #888; font-size: 18px; margin-bottom: 20px;">  
                        <i class="fas fa-circle" style="color: #00ff88; font-size: 12px;"></i>   
                         Graphic Designer 🚀  
                    </p>  

                    <!-- معلومات الاتصال -->  
                    <div class="contact-info">
                        <div class="contact-item">
                            <i class="fab fa-whatsapp" style="color: #25D366;"></i>
                            <h3>واتساب</h3>
                            <p>+20125155576</p>
                        </div>
                        <div class="contact-item">
                            <i class="fab fa-facebook-messenger" style="color: #0084ff;"></i>
                            <h3>ماسنجر</h3>
                            <p>@MafiaXat</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ====== Radio Section ====== -->
        <section class="radio-section">
            <h2 style="color: #e94560; margin-bottom: 20px;"><i class="fas fa-broadcast-tower"></i> راديو الموقع</h2>
            <div class="radio-player">
                <div class="radio-icon">
                    <i class="fas fa-music"></i>
                </div>
                <div class="radio-controls">
                    <h3>استمع الآن إلى أفضل المقاطع</h3>
                    <button class="radio-btn active" id="playBtn" onclick="toggleRadio()"><i class="fas fa-play"></i> تشغيل</button>
                    <audio id="siteRadio"></audio>
                </div>
            </div>
        </section>

        <!-- ====== Chat Section ====== -->
        <section class="chat-section">
            <h2 style="color: #e94560; margin-bottom: 20px;"><i class="fas fa-comments"></i> تواصل معي الآن</h2>
            <div class="chat-box" id="chatBox">
                <div class="message received">
                    <div class="message-content">أهلاً بك في معرضي! كيف يمكنني مساعدتك اليوم؟</div>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
                <button class="radio-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

    </main>  

    <script src="../js/app.js"></script>  
    <script src="../js/audio.js"></script>
    <script src="../js/media.js"></script>
    <script>
        // Chat Logic
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (message) {
                const chatBox = document.getElementById('chatBox');
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message sent';
                msgDiv.innerHTML = `<div class="message-content">${message}</div>`;
                chatBox.appendChild(msgDiv);
                input.value = '';
                chatBox.scrollTop = chatBox.scrollHeight;
                
                // Simulate reply
                setTimeout(() => {
                    const replyDiv = document.createElement('div');
                    replyDiv.className = 'message received';
                    replyDiv.innerHTML = `<div class="message-content">شكراً لتواصلك! سأرد عليك في أقرب وقت.</div>`;
                    chatBox.appendChild(replyDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 1000);
            }
        }
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        // تعيين الوسائط ديناميكيا
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof MEDIA_ASSETS !== 'undefined') {
                // تعيين الصورة الشخصية
                const profileImg = document.getElementById('aboutProfileImg');
                if (profileImg && SITE_CONFIG && SITE_CONFIG.profileImage) {
                    const isUrl = SITE_CONFIG.profileImage.startsWith('http');
                    profileImg.src = isUrl ? SITE_CONFIG.profileImage : `../assets/profile/${SITE_CONFIG.profileImage}`;
                }
                
                // تعيين الصوت
                const siteRadio = document.getElementById('siteRadio');
                if (siteRadio && MEDIA_ASSETS.audio && MEDIA_ASSETS.audio.length > 0) {
                    siteRadio.src = `../assets/audio/${MEDIA_ASSETS.audio[0].file}`;
                }
            }
        });
    </script>
</body>  
</html>
