<!-- pages/html.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - تصاميم HTML</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/gallery.css">
    <script src="../js/data.js"></script>
</head>
<body>

    <!-- Banner صغير -->
    <div style="
        background: linear-gradient(135deg, #0f0c29, #302b63);
        padding: 30px; text-align: center;
    ">
        <h1 style="color: white; font-size: 42px;">
            <i class="fas fa-code" style="color: #e94560;"></i> 
            HTML Designs
        </h1>
        <p style="color: #888; font-size: 18px;">تصاميم HTML من روابط خارجية</p>
    </div>

    <!-- نفس شريط التنقل -->
    <nav class="main-nav" style="background: #16213e; padding: 15px 0;">
        <div id="dynamic-nav-container" class="nav-container" style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;">
        </div>
    </nav>

    <!-- ====== GALLERY GRID ====== -->
    <main style="padding: 40px 20px; max-width: 1200px; margin: 0 auto;">

        <!-- شبكة الصور يتم توليدها ديناميكياً عبر gallery.js -->
        <div class="dynamic-gallery" id="galleryGrid" data-category="html" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px;">
        </div>

    </main>

    <!-- ====== MODAL ZOOM ====== -->
    <div id="zoomModal" class="modal">
        <span class="close-modal" onclick="closeZoom()">&times;</span>
        <div class="modal-content">
            <img id="zoomImage" src="" alt="Zoom">
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/zoom.js"></script>
    <script src="../js/media.js"></script>
    <script src="../js/gallery.js"></script>
</body>
</html>
