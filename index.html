<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 معرض الخلفيات المتحركة</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">

    <!-- إعدادات الموقع القابلة للتخصيص يتم تحميلها من data.js -->
    <script src="js/data.js"></script>
</head>

<body>

    <!-- Toggle Header Button -->
    <button id="toggleHeaderBtn" class="toggle-header-btn" onclick="toggleHeader()">
        <i class="fas fa-eye"></i>
    </button>

    <!-- ====== HEADER / BANNER ====== -->
    <header id="mainHeader" class="main-header" style="background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); padding: 0;">

        <!-- Banner Section -->
        <div class="banner-container" style="position: relative; width: 100%; height: 250px; overflow: hidden;">
            <!-- خلفية البانر -->
            <div id="dynamic-banner" class="banner-bg" style="
                width: 100%; height: 100%; filter: brightness(0.6);
                animation: zoomBanner 20s infinite alternate;
                background-position: center; background-size: cover; background-repeat: no-repeat;
            "></div>

            <!-- محتوى البانر -->
            <div class="banner-content" style="
                position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                text-align: center; color: white; z-index: 2;
            ">
                <!-- الصورة الشخصية -->
                <div id="dynamic-profile" class="profile-avatar" style="
                    width: 80px; height: 80px; border-radius: 50%; 
                    border: 4px solid #ff3300; margin: 0 auto 10px;
                    box-shadow: 0 0 30px rgba(255, 51, 0, 0.8);
                    transition: transform 0.3s;
                    background-position: center; background-size: cover; background-repeat: no-repeat;
                " onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                </div>

                <!-- الاسم -->
                <h1 class="site-title"
                    style="font-size: 32px; margin: 5px 0; text-shadow: 0 0 20px rgba(255,51,0,0.8);">
                    <i class="fas fa-fire" style="color: #ffaa00;"></i>
                    <span id="userName" class="fire-text">Mafia</span>
                </h1>

                <!-- الحالة -->
                <p class="status" style="
                    font-size: 16px; color: #ffaa00; 
                    background: rgba(0,0,0,0.6); padding: 5px 20px;
                    border-radius: 30px; display: inline-block;
                    border: 1px solid #ff3300;
                ">
                    <i class="fas fa-fire-alt" style="color: #ff3300; font-size: 14px; margin-left: 8px;"></i>
                    <span id="userStatus"> Graphic Designer 🚀</span>
                </p>
            </div>
        </div>

        <!-- شريط البحث -->
        <div class="search-bar" style="
            padding: 15px; background: rgba(0,0,0,0.8);
            border-top: 2px solid #ff3300;
        ">
            <div class="search-container" style="max-width: 600px; margin: 0 auto; position: relative;">
                <input type="text" id="searchInput" placeholder="🔍 ابحث عن خلفية أو تصميم..." style="
                    width: 100%; padding: 12px 20px; border-radius: 50px;
                    border: 2px solid #ff3300; background: rgba(255,255,255,0.1);
                    color: white; font-size: 14px; outline: none;
                ">
                <button onclick="searchDesign()" class="fire-btn" style="
                    position: absolute; left: 5px; top: 5px;
                    padding: 8px 20px; border-radius: 50px;
                    border: none; cursor: pointer; font-size: 14px;
                ">بحث</button>
            </div>
        </div>
    </header>

    <!-- ====== MAIN NAVIGATION ====== -->
    <nav class="main-nav" style="
        background: #0f0f0f !important; padding: 15px 0;
        position: sticky; top: 0; z-index: 1000;
        box-shadow: 0 5px 20px rgba(255,51,0,0.3);
        border-bottom: 1px solid #ff3300;
    ">
        <div id="dynamic-nav-container" class="nav-container fire-nav-container"
            style="max-width: 1200px; margin: 0 auto; display: flex;">
        </div>
    </nav>

    <!-- ====== FEATURED MAIN IMAGE ====== -->
    <main style="display: flex; flex-direction: column; min-height: calc(100vh - 70px); margin: 0; padding: 0; background: url('assets/MafiaXat.png') center/cover no-repeat;">
    </main>

    <!-- ====== FOOTER ====== -->
    <footer style="
        background: #0f0c29; text-align: center; 
        padding: 30px 20px; border-top: 3px solid #e94560;
        margin-top: 60px;
    ">
        <p style="color: #888;">
            © 2026 <span style="color: #e94560;">معرض الخلفيات</span>
            | جميع الحقوق محفوظة
            <i class="fas fa-heart" style="color: #e94560;"></i>
        </p>
        <div style="margin-top: 15px;">
            <a href="https://wa.me/201234567890" target="_blank"
                style="color: #25D366; margin: 0 10px; font-size: 24px;">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="https://m.me/username" target="_blank" style="color: #0084ff; margin: 0 10px; font-size: 24px;">
                <i class="fab fa-facebook-messenger"></i>
            </a>
            <a href="#" style="color: #e94560; margin: 0 10px; font-size: 24px;">
                <i class="fas fa-music"></i>
            </a>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
    <script src="js/media.js"></script>
    <script src="js/gallery.js"></script>
</body>

</html>
